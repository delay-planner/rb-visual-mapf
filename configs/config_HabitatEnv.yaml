agent:
    discount: 1
    ensemble_size: 3
    num_bins: 20
    actor_update_interval: 1
    targets_update_interval: 5
    tau: 0.05
    use_distributional_rl: true
ckpt_dir: runs_debug/UVFDDPG
env:
    height: 0.0
    scene: "external_data/scene_datasets/habitat-test-scenes/skokloster-castle.glb"
    apsp_path: "pud/envs/safe_habitatenv/apsps/skokloster/apsp.pickle"
    cost_limit: 1.0
    sensor_type: "depth"
    simulator_settings:
        scene: "external_data/scene_datasets/habitat-test-scenes/skokloster-castle.glb"
        width: 32
        height: 32
        default_agent: 0
        sensor_height: 1.5
wrappers:
    GoalConditionedHabitatPointWrapper:
        min_dist: 0 
        max_dist: 4
        prob_constraint: 0.8
        threshold_distance: 1.0
replay_buffer:
    max_size: 100000
time_limit:
    max_episode_steps: 20
runner:
    batch_size_opt: 64
    collect_steps: 10 # 2
    eval_interval: 1000 # 1000
    initial_collect_steps: 1000 # 1000
    num_iterations: 3000000
    opt_steps: 1
device: "cuda:0"
seed: 0
