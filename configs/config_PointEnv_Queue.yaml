agent:
    discount: 1
    ensemble_size: 3
    num_bins: 20
    actor_update_interval: 1
    targets_update_interval: 5
    tau: 0.05
    use_distributional_rl: true
    # cost configs
    cost_limit: 1.0
    cost_min: 0.0
    cost_max: 1.0
    cost_N: 20
    cost_critic_lr: 0.001
    lambda_lr: 0.001
    lambda_optimizer: "Adam"
ckpt_dir: ./workdirs/train_CentralObstacle/
#ckpt_dir: ./workdirs/debug_FourRooms/
env:
    walls: CentralObstacle
    resize_factor: 5
    thin: false
    cost_limit: 1.0
wrappers:
    SafeGoalConditionedPointQueueWrapper:
        prob_constraint: 0.5
        min_dist: 0 
        max_dist: 20
        min_cost: 0.3
        max_cost: 1.0
        threshold_distance: 1.0
time_limit:
    max_episode_steps: 20
cost_function:
    name: "cosine"
    radius: 2.0
replay_buffer:
    max_size: 1000
runner:
    batch_size_opt: 64
    collect_steps: 2
    eval_interval: 1000
    initial_collect_steps: 1000
    num_eval_episodes: 10
    num_iterations: 300000
    opt_steps: 1
    warmup_epochs: 1000
    eval_distances: [2, 5, 10]
    eval_cost_intervals: [0.0, 0.25, 0.5, 1.0]
    verbose: false
    sample_size: 500
    num_train_pbs_per_ref: 10
    cost_min_dist: 1.0
    cost_max_dist: 10.0
device: "cpu"
seed: 0
